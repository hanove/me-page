<script>
  var i = 0;
  var txt = 'HI, MY NAME IS HEITOR';
  var speed = 80;

  function typeWriter() {
    if (i < txt.length) {
      document.getElementById("greetings").innerHTML += txt.charAt(i);
      i++;
      setTimeout(typeWriter, speed);
    }
  }

  $(document).ready(typeWriter());
